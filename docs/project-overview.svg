<svg width="1280" height="560" viewBox="0 0 1280 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Activation checkpointing project overview</title>
  <desc id="desc">A flow diagram showing graph tracing, profiling, checkpoint planning, graph rewriting, benchmarking, and visualization.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F4EA"/>
      <stop offset="1" stop-color="#EEF6F7"/>
    </linearGradient>
    <linearGradient id="cardWarm" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF8E7"/>
      <stop offset="1" stop-color="#FCE7C8"/>
    </linearGradient>
    <linearGradient id="cardCool" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EEF8FF"/>
      <stop offset="1" stop-color="#D8EEF4"/>
    </linearGradient>
    <linearGradient id="cardAccent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EFF8ED"/>
      <stop offset="1" stop-color="#D8F0D4"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="1320" height="600" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#34515E" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#355C6E"/>
    </marker>
  </defs>

  <rect width="1280" height="560" rx="28" fill="url(#bg)"/>
  <g opacity="0.55">
    <circle cx="1140" cy="78" r="88" fill="#DCEFE7"/>
    <circle cx="132" cy="448" r="96" fill="#E6EEF9"/>
    <circle cx="664" cy="44" r="50" fill="#F8E4CC"/>
  </g>

  <text x="70" y="82" fill="#13313F" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Project flow</text>
  <text x="70" y="114" fill="#4D6673" font-family="Segoe UI, Arial, sans-serif" font-size="18">From traced training graph to profiler-guided activation checkpointing, benchmarks, and interactive inspection.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="158" width="255" height="270" rx="24" fill="url(#cardWarm)" stroke="#D8BC8B"/>
    <rect x="375" y="158" width="255" height="270" rx="24" fill="url(#cardCool)" stroke="#A7C8D5"/>
    <rect x="680" y="158" width="255" height="270" rx="24" fill="url(#cardAccent)" stroke="#A4C69A"/>
    <rect x="985" y="158" width="225" height="270" rx="24" fill="white" stroke="#C8D6DB"/>
  </g>

  <text x="98" y="202" fill="#7A4B12" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">1. Trace a training step</text>
  <text x="98" y="236" fill="#213845" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">PyTorch FX graph</text>
  <text x="98" y="270" fill="#4D6673" font-family="Segoe UI, Arial, sans-serif" font-size="17">Capture one iteration containing:</text>
  <text x="98" y="302" fill="#4D6673" font-family="Segoe UI, Arial, sans-serif" font-size="17">forward pass, backward pass, and</text>
  <text x="98" y="334" fill="#4D6673" font-family="Segoe UI, Arial, sans-serif" font-size="17">optimizer updates.</text>
  <rect x="98" y="365" width="188" height="34" rx="17" fill="#F6E1B8"/>
  <text x="117" y="388" fill="#6A4A17" font-family="Consolas, monospace" font-size="15">graph_tracer.py</text>

  <text x="403" y="202" fill="#1C6070" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">2. Analyze memory + cost</text>
  <text x="403" y="236" fill="#213845" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Profiler + policy</text>
  <text x="403" y="270" fill="#4D6673" font-family="Segoe UI, Arial, sans-serif" font-size="17">Estimate activation lifetimes,</text>
  <text x="403" y="302" fill="#4D6673" font-family="Segoe UI, Arial, sans-serif" font-size="17">tensor sizes, runtime cost, and</text>
  <text x="403" y="334" fill="#4D6673" font-family="Segoe UI, Arial, sans-serif" font-size="17">which activations to recompute.</text>
  <rect x="403" y="365" width="183" height="34" rx="17" fill="#D8EEF8"/>
  <text x="421" y="388" fill="#1E5666" font-family="Consolas, monospace" font-size="15">graph_prof.py</text>
  <rect x="403" y="405" width="223" height="34" rx="17" fill="#D8EEF8"/>
  <text x="421" y="428" fill="#1E5666" font-family="Consolas, monospace" font-size="15">activation_checkpoint.py</text>

  <text x="708" y="202" fill="#346A22" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">3. Rewrite the graph</text>
  <text x="708" y="236" fill="#213845" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Checkpointed graph</text>
  <text x="708" y="270" fill="#4D6673" font-family="Segoe UI, Arial, sans-serif" font-size="17">Discard selected activations in</text>
  <text x="708" y="302" fill="#4D6673" font-family="Segoe UI, Arial, sans-serif" font-size="17">forward, then recompute them</text>
  <text x="708" y="334" fill="#4D6673" font-family="Segoe UI, Arial, sans-serif" font-size="17">just before backward needs them.</text>
  <rect x="708" y="365" width="162" height="34" rx="17" fill="#DCEFD5"/>
  <text x="726" y="388" fill="#376228" font-family="Consolas, monospace" font-size="15">lower peak memory</text>

  <text x="1013" y="202" fill="#425C69" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">4. Evaluate and inspect</text>
  <text x="1013" y="236" fill="#213845" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Outputs</text>
  <text x="1013" y="272" fill="#4D6673" font-family="Segoe UI, Arial, sans-serif" font-size="17">Benchmark sweeps</text>
  <text x="1013" y="304" fill="#4D6673" font-family="Segoe UI, Arial, sans-serif" font-size="17">Profiler summaries</text>
  <text x="1013" y="336" fill="#4D6673" font-family="Segoe UI, Arial, sans-serif" font-size="17">Checkpoint plans</text>
  <text x="1013" y="368" fill="#4D6673" font-family="Segoe UI, Arial, sans-serif" font-size="17">Memory and latency plots</text>
  <text x="1013" y="400" fill="#4D6673" font-family="Segoe UI, Arial, sans-serif" font-size="17">Streamlit demo</text>

  <path d="M326 292H367" stroke="#355C6E" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M631 292H672" stroke="#355C6E" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M936 292H977" stroke="#355C6E" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="452" y="472" width="377" height="42" rx="21" fill="#173746"/>
  <text x="483" y="499" fill="#F7FBFC" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Goal: trade extra compute for lower training-time activation memory</text>
</svg>
